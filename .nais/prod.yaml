apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: kiss
  namespace: pensjon-revisjon
  labels:
    team: pensjon-revisjon
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  image: "{{image}}"
  port: 3000
  replicas:
    min: 2
    max: 2
  liveness:
    path: /api/isalive
    initialDelay: 20
    timeout: 60
  readiness:
    path: /api/isready
    initialDelay: 20
    timeout: 60
  resources:
    limits:
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 256Mi
  ingresses:
    - https://kiss.ansatt.nav.no
  azure:
    application:
      enabled: true
      claims:
        groups:
          - id: 1e97cbc6-0687-4d23-aebd-c611035279c1  # pensjon-revisjon (admin)
          - id: 44e8f280-31f5-4d38-b4d6-d0d7ff10d137  # nais-team-pensjon-kiss-revisjon (revisor)
          - id: 70c6e964-e265-4f1d-a55e-1c8d8b60ffcb  # nais-team-pensjon-kiss (user)
        extra:
          - "NAVident"
    sidecar:
      enabled: true
      autoLogin: true
  gcp:
    sqlInstances:
      - type: POSTGRES_18
        tier: db-custom-1-3840
        pointInTimeRecovery: true
        flags:
          - name: "cloudsql.enable_pgaudit"
            value: "on"
          - name: "pgaudit.log"
            value: "write,ddl,role"
          - name: "pgaudit.log_parameter"
            value: "on"
        databases:
          - name: kiss
    buckets:
      - name: kiss-data
        retentionPeriodDays: 4015
        cascadingDelete: false
        lifecycleCondition:
          withState: ANY
  observability:
    autoInstrumentation:
      enabled: true
      runtime: nodejs
    logging:
      destinations:
        - id: loki
        - id: elastic
  accessPolicy:
    outbound:
      rules:
        - application: pensjon-deployment-audit
      external:
        - host: graph.microsoft.com
        - host: console.nav.cloud.nais.io
        - host: pensjon-oracle-revisjon-backend.prod-fss-pub.nais.io
  env:
    - name: NODE_ENV
      value: production
    - name: TZ
      value: Europe/Oslo
    - name: NAIS_API_URL
      value: https://console.nav.cloud.nais.io/graphql
    - name: ENABLE_NAIS_SYNC
      value: "true"
    - name: ENABLE_SYNC_JOB_RETENTION_CLEANUP
      value: "true"
    - name: SYNC_JOB_RETENTION_DAYS
      value: "90"
    - name: SYNC_JOB_RETENTION_BATCH_SIZE
      value: "500"
    - name: KISS_ADMIN_GROUP_IDS
      value: "1e97cbc6-0687-4d23-aebd-c611035279c1"
    - name: KISS_AUDITOR_GROUP_IDS
      value: "44e8f280-31f5-4d38-b4d6-d0d7ff10d137"
    - name: GCS_BUCKET_NAME
      value: kiss-data
    - name: ORACLE_REVISJON_BASE_URL
      value: "https://pensjon-oracle-revisjon-backend.prod-fss-pub.nais.io"
    - name: ORACLE_REVISJON_SCOPE
      value: "api://prod-fss.pensjon-revisjon.pensjon-oracle-revisjon-backend/.default"
    - name: ENABLE_AUDIT_SUMMARY_SYNC
      value: "true"
    - name: DEPLOYMENT_AUDIT_BASE_URL
      value: "http://pensjon-deployment-audit.pensjon-revisjon"
    - name: DEPLOYMENT_AUDIT_SCOPE
      value: "api://prod-gcp.pensjon-revisjon.pensjon-deployment-audit/.default"
    - name: ENABLE_DEPLOYMENT_AUDIT_SYNC
      value: "true"
    - name: SHOW_COMPLIANCE_STATS
      value: "false"
  envFrom:
    - secret: nais-deployment-audit
